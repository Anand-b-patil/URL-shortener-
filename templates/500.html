<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
    <div class="text-center text-white">
        <i class="fas fa-exclamation-triangle text-9xl mb-8 opacity-75"></i>
        <h1 class="text-6xl font-bold mb-4">500</h1>
        <h2 class="text-3xl font-semibold mb-4">Server Error</h2>
        <p class="text-xl mb-8 opacity-90">
            Something went wrong on our end. Please try again later.
        </p>
        <a href="/" class="inline-block bg-white text-purple-600 font-bold px-8 py-4 rounded-lg hover:bg-gray-100 transition">
            <i class="fas fa-home mr-2"></i>
            Go to Homepage
        </a>
    </div>
</body>
</html>
